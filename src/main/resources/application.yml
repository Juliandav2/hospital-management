server:
  port: 8080

spring:
  application:
    name: hospital-management

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_db
    username: ${DB_USERNAME:hospital_user}
    password: ${DB_PASSWORD:hospital_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enable: true
    baseline-on-migrate: true
    locations: classpath:db/migration